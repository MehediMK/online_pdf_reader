<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Online PDF Reader</title>
  <link rel="stylesheet" href="./src/css/style.css">
   <!-- ✅ jQuery (required by Turn.js) -->
  <script src="./src/js/jquery-3.6.0.min.js"></script>

  <!-- ✅ Turn.js -->
  <script src="./src/js/turn.min.js"></script>

  <!-- ✅ PDF.js -->
  <script src="./src/js/pdf.min.js"></script>
</head>
<body>

  <h1 style="text-align: center;">📘 Online PDF Reader</h1>

  <div id="controls">
    <input type="file" id="fileInput" accept="application/pdf">
    <button id="loadBtn" class="btn">Load PDF</button>
    <button id="prevBtn" class="btn secondary">Prev</button>
    
    <!-- 🔢 Page number input -->
    <input type="number" id="pageNumberInput" min="1" style="width:60px;" placeholder="Pg#" />
    <span id="totalPages"></span>

    <button id="nextBtn" class="btn secondary">Next</button>

    <button id="zoomInBtn" class="btn zoom">🔍+</button>
    <button id="zoomOutBtn" class="btn zoom">🔎−</button>
    <span id="status">No file selected.</span>
    <button id="toggleSoundBtn" class="btn">🔈 Toggle Sound</button>
    <button id="fitWidthBtn" class="btn">↔ Fit Width</button>
    <button id="fitPageBtn" class="btn">↕ Fit Page</button>
    <button id="toggleViewBtn" class="btn">📖 Toggle View</button>
    <button id="nightModeBtn" class="btn">🌙 Night Mode</button>
    
    <button id="annotateBtn" class="btn">✏️ Annotate</button>
    <button id="toolFreehand" class="btn">✏️ Draw</button>
    <button id="toolHighlight" class="btn">🖍️ Highlight</button>
    <input type="color" id="colorPicker" value="#ff0000">
    <button id="saveAnnotations" class="btn">💾 Save</button>
    <button id="loadAnnotations" class="btn">📂 Load</button>

  </div>

  <div class="pdf-wrapper">
    <!-- 📑 Sidebar for thumbnails & outline -->
    <aside class="sidebar">
      <h3>Thumbnails</h3>
      <div id="thumbnailContainer" class="thumbnails"></div>

      <h3>Table of Contents</h3>
      <ul id="outlineContainer" class="outline"></ul>
    </aside>

    <!-- 📖 Main Flipbook -->
    <main class="flipbook-container">
      <div id="flipbook" class="shadow"></div>
    </main>
  </div>
  <audio id="flipSound" src="./src/static/paper_slider.mp3" preload="auto"></audio>

  <footer>
    <p>Built with ❤️ using <strong>PDF.js</strong> & <strong>Turn.js</strong></p>
  </footer>

  <script src="./src/js/main.js"></script>

</body>
</html>
