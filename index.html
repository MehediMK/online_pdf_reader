<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Online PDF Reader</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./src/css/style.css">
   <!-- ✅ jQuery (required by Turn.js) -->
  <script src="./src/js/jquery-3.6.0.min.js"></script>

  <!-- ✅ Turn.js -->
  <script src="./src/js/turn.min.js"></script>

  <!-- ✅ PDF.js -->
  <script src="./src/js/pdf.min.js"></script>
</head>
<body>

  <!-- Header -->
  <header class="app-header">
    <div class="header-inner">
      <h1>📘 PDF Reader</h1>
      <button id="sidebarToggle" class="btn secondary sidebar-toggle" title="Toggle Sidebar">☰</button>
    </div>
    <div id="progressBar" class="progress-bar">
      <div id="progressFill" class="progress-fill" style="width: 0%"></div>
    </div>
  </header>

  <!-- Controls Bar -->
  <nav id="controls">
    <div class="control-group">
      <input type="file" id="fileInput" accept="application/pdf">
      <button id="loadBtn" class="btn primary">Load</button>
    </div>

    <div class="control-divider"></div>

    <div class="control-group">
      <button id="prevBtn" class="btn secondary" title="Previous Page">◀</button>
      <input type="number" id="pageNumberInput" min="1" placeholder="Pg#" title="Page number" />
      <span id="totalPages" class="page-info"></span>
      <button id="nextBtn" class="btn secondary" title="Next Page">▶</button>
    </div>

    <div class="control-divider"></div>

    <div class="control-group">
      <button id="zoomOutBtn" class="btn zoom" title="Zoom Out">−</button>
      <span id="zoomLevel" class="badge">100%</span>
      <button id="zoomInBtn" class="btn zoom" title="Zoom In">+</button>
      <button id="fitWidthBtn" class="btn" title="Fit Width">↔</button>
      <button id="fitPageBtn" class="btn" title="Fit Page">↕</button>
    </div>

    <div class="control-divider"></div>

    <div class="control-group">
      <button id="toggleViewBtn" class="btn" title="Toggle Single/Double View">📖 View</button>
      <button id="toggleSoundBtn" class="btn" title="Toggle Sound">🔊</button>
      <button id="nightModeBtn" class="btn" title="Night Mode">🌙</button>
    </div>

    <div class="control-divider"></div>

    <div class="control-group annotation-controls">
      <button id="annotateBtn" class="btn" title="Toggle Annotation Mode">✏️ Annotate</button>
      <button id="toolFreehand" class="btn" title="Freehand Draw">🖊 Draw</button>
      <button id="toolHighlight" class="btn" title="Highlight Text">🖍 Highlight</button>
      <input type="color" id="colorPicker" value="#ff0000" title="Annotation Color">
      <button id="saveAnnotations" class="btn" title="Save Annotations">💾</button>
      <button id="loadAnnotations" class="btn" title="Load Annotations">📂</button>
    </div>

    <div class="control-divider"></div>

    <div class="control-group">
      <button id="presentationBtn" class="btn toggle-on" title="Full-Screen Presentation">🖥 Present</button>
      <span id="status" class="status-badge">No file selected.</span>
    </div>
  </nav>

  <div class="pdf-wrapper">
    <!-- 📑 Sidebar for thumbnails & outline -->
    <aside id="sidebar" class="sidebar">
      <div class="sidebar-section">
        <div class="sidebar-section-header">
          <h3>Pages</h3>
          <span id="readBadge" class="sidebar-read-badge" style="display:none"></span>
        </div>
        <div id="resumePrompt" class="resume-prompt" style="display:none">
          <button id="resumeBtn" class="btn primary resume-btn">Resume reading</button>
        </div>
        <div id="thumbnailContainer" class="thumbnails"></div>
      </div>

      <div class="sidebar-section">
        <h3>Table of Contents</h3>
        <ul id="outlineContainer" class="outline"></ul>
      </div>
    </aside>

    <!-- 🖥 Main Flipbook -->
    <main class="flipbook-container">
      <div id="flipbook" class="shadow"></div>
      <div id="emptyState" class="empty-state">
        <div class="empty-icon">📄</div>
        <p>Upload a PDF to get started</p>
      </div>
    </main>
  </div>

  <audio id="flipSound" src="./src/static/paper_slider.mp3" preload="auto"></audio>

  <!-- 🖥️ Presentation Mode Overlay -->
  <div id="presentationOverlay" class="presentation-overlay hidden">
    <div id="presentationPage" class="presentation-page"></div>
    <div class="presentation-controls">
      <button id="presentationPrev" class="btn secondary">← Prev</button>
      <button id="presentationNext" class="btn secondary">Next →</button>
      <button id="presentationExit" class="btn secondary">✕ Exit</button>
    </div>
    <div id="presentationProgress" class="presentation-progress"></div>
  </div>

  <footer>
    <p>Built with ❤️ using <strong>PDF.js</strong> & <strong>Turn.js</strong></p>
  </footer>

  <script src="./src/js/main.js"></script>

</body>
</html>
