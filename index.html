<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>PDF → Flipbook (Turn.js + PDF.js)</title>
  <link rel="stylesheet" href="./src/css/style.css">
   <!-- ✅ jQuery (required by Turn.js) -->
  <script src="./src/js/jquery-3.6.0.min.js"></script>

  <!-- ✅ Turn.js -->
  <script src="./src/js/turn.min.js"></script>

  <!-- ✅ PDF.js -->
  <script src="./src/js/pdf.min.js"></script>
</head>
<body>

  <h1>📘 PDF → Flipbook (Client-Side)</h1>

  <div id="controls">
    <input type="file" id="fileInput" accept="application/pdf">
    <button id="loadBtn" class="btn">Load PDF</button>
    <button id="prevBtn" class="btn secondary">Prev</button>
    <button id="nextBtn" class="btn secondary">Next</button>
    <button id="zoomInBtn" class="btn zoom">🔍 Zoom In</button>
    <button id="zoomOutBtn" class="btn zoom">🔎 Zoom Out</button>
    <span id="status">No file selected.</span>
  </div>

<main class="flipbook-container">
    <div id="flipbook" class="shadow"></div>
  </main>

  <footer>
    <p>Built with ❤️ using <strong>PDF.js</strong> & <strong>Turn.js</strong></p>
  </footer>

  <script src="./src/js/main.js"></script>

</body>
</html>
